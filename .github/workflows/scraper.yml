name: Scrape Judgments Daily

on:
  schedule:
    - cron: '30 20 * * *'   # Every day
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      
      - name: Run scraper
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_KEY: ${{ secrets.QDRANT_KEY }}
        run: |
          cd backend
          python -m app.scraper
          python -m app.parser
          python -m app.embeddings
      
      - name: Commit new data
        run: |
          git config --global user.name "CaseCut AI Bot"
          git config --global user.email "ybthummar@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: $(date +%Y-%m-%d)"
          git push